# Runs only on pushes to main, after CI on that commit would have passed.
# The image-publish job needs nothing beyond the GITHUB_TOKEN that every
# workflow already gets, so it works the moment this repo is pushed with
# no extra setup. The Terraform plan job is the one piece that needs real
# AWS access (via OIDC, no long-lived keys in the repo); it is gated on a
# repo variable so it skips cleanly instead of failing when that variable
# is not set.
name: CD

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  publish-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/aws-cicd-pipeline-demo:latest
            ghcr.io/${{ github.repository_owner }}/aws-cicd-pipeline-demo:${{ github.sha }}

  terraform-plan:
    runs-on: ubuntu-latest
    needs: publish-image
    # Skips instead of failing when AWS_ROLE_ARN is not configured as a
    # repo variable. See terraform/README section in the root README for
    # how to set this up. Until then, this job is a documented no-op.
    if: vars.AWS_ROLE_ARN != ''
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"

      - run: terraform init
      - run: terraform plan -no-color
