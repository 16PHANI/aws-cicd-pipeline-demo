# Runs on every push and pull request. Nothing in this file needs AWS
# credentials or any repo secret, so it passes the same way on a fork as
# it does here.
name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install -r requirements-dev.txt
      - run: black --check app tests
      - run: isort --check-only app tests
      - run: flake8 app tests

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install -r requirements-dev.txt
      - run: pytest --cov=app --cov-report=term-missing --cov-report=xml --cov-fail-under=85
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  security-scan:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install bandit pip-audit
      - run: bandit -r app -ll
      - name: pip-audit (advisory, does not fail the build yet)
        run: pip-audit -r requirements.txt || true

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: aws-cicd-pipeline-demo:ci

  terraform-checks:
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v7
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"
      - run: terraform fmt -check -recursive
      - run: terraform init -backend=false
      - run: terraform validate
      - uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: v0.52.0
      - run: tflint --init
      - run: tflint --recursive
